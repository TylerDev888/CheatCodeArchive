name: Generate README files

on:
  workflow_dispatch:

jobs:
  generate-readmes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate README files from cheats.yaml
        shell: pwsh
        run: ./Generate-ReadmeFiles.ps1

      - name: Commit and push any changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No README files changed — nothing to commit."
          else
            git commit -m "chore: regenerate README files from cheats.yaml [skip ci]"
            git push
          fi
