    notes: "[Encrypt Mgs3]  File: *DATA.BIN"
    codes:
      - "set range:0x000000,0x00497B"
      - "set [master_hash]:CRC32"
      - "ENCRYPT mgs(\"3MetalSolidSnakeEaterGear\")"

  - name: "Encode Master.bin (required)"
    notes: "[Encrypt Mgs3]  File: *MASTER.BIN"
    codes:
