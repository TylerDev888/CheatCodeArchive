  - name: "Update Crc32 Checksum For Usr-data (required)"
    notes: "File: USR-DATA"
    codes:
      - "set [block_length]:read(0x58C,4)"
      - "set [block_length]:[block_length]+0x587"
      - "set range:0x58C,[block_length]"
      - "set [hash]:crc32"
      - "write at 0x588:[hash]"

  - name: "Update Hmac Sha1 Checksum For Usr-data (required)"
    notes: "File: USR-DATA"
    codes:
      - "set pointer:EOF-0x1F"
      - "set range:0x000008,pointer"
      - "set [hash]:hmac_sha1(\"xM;6X%/p^L/:}-5QoA+K8:F*M!~sb(WK<E%6sW_un0a[7Gm6,()kHoXY+yI/s;Ba\")"
      - "set pointer:EOF-0x1F"
      - "write next (0):[hash]"

  - name: "Encrypt Usr-data (required)"
